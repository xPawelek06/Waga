name: Weekly summary

# Ma sie wywolac w kazda niedziele ok. 20:00 czasu polskiego (Europe/Warsaw).
# GitHub Actions cron dziala WYLACZNIE w UTC, a Polska zmienia strefe (CEST latem /
# CET zima) - zamiast recznie poprawiac cron dwa razy w roku (latwo zapomniec, patrz
# doswiadczenie z innym projektem - "DST-cron routine wciaz wymaga poprawki w
# pazdzierniku"), uruchamiamy job w OBU mozliwych godzinach UTC (18:00 i 19:00) i w
# srodku sprawdzamy realna godzine w Europe/Warsaw - endpoint wywolujemy tylko, gdy
# wychodzi 20. Dzieki temu dziala poprawnie caly rok bez recznej poprawki.
on:
  schedule:
    - cron: "0 18 * * 0" # 20:00 CEST (lato, UTC+2)
    - cron: "0 19 * * 0" # 20:00 CET (zima, UTC+1)
  workflow_dispatch: {}

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Sprawdz, czy w Europe/Warsaw jest teraz 20:00
        id: check
        run: |
          hour=$(TZ='Europe/Warsaw' date +%H)
          echo "Godzina lokalna (Europe/Warsaw): $hour"
          if [ "$hour" = "20" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wywolaj POST /api/admin/weekly-summary
        if: steps.check.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sf -X POST "${API_BASE}/api/admin/weekly-summary" \
            -H "X-Auth-Secret: ${APP_SECRET}" \
            -H "Content-Type: application/json"
        env:
          API_BASE: https://waga-api-vorc.onrender.com
          APP_SECRET: ${{ secrets.APP_SECRET }}
